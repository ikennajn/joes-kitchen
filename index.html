/* ─── RECEIPT ALIAS STORE ─── */
// Supabase-backed alias map: receipt line text + store -> inventory item
// Uses receipt_aliases table: id, store, raw_name, inventory_id, inventory_name, add_config
const receiptAliasStore = {
  _cache: null, // { "store||rawname": { inventoryId, inventoryName, addConfig, id } }

  _mk(store, rawName) {
    return `${(store||'').toLowerCase().trim()}||${(rawName||'').toLowerCase().trim()}`;
  },

  async _ensureLoaded() {
    if (this._cache) return;
    try {
      const rows = await db.getAliases();
      this._cache = {};
      for (const r of (rows || [])) {
        const k = this._mk(r.store, r.raw_name);
        this._cache[k] = {
          id: r.id,
          inventoryId: r.inventory_id,
          inventoryName: r.inventory_name,
          addConfig: r.add_config || null,
        };
      }
    } catch { this._cache = {}; }
  },

  async get(store, rawName) {
    await this._ensureLoaded();
    return this._cache[this._mk(store, rawName)] || null;
  },

  async saveMatch(store, rawName, inventoryId, inventoryName) {
    await this._ensureLoaded();
    const k = this._mk(store, rawName);
    const existing = this._cache[k] || {};
    const row = {
      store: (store||'').toLowerCase().trim(),
      raw_name: (rawName||'').toLowerCase().trim(),
      inventory_id: inventoryId,
      inventory_name: inventoryName,
      add_config: existing.addConfig || null,
    };
    if (existing.id) row.id = existing.id;
    try {
      const res = await db.upsertAlias(row);
      const saved = Array.isArray(res) ? res[0] : res;
      this._cache[k] = { id: saved?.id || existing.id, inventoryId, inventoryName, addConfig: existing.addConfig || null };
    } catch (e) { console.error('saveMatch failed', e); }
  },

  async saveAddConfig(store, rawName, addConfig) {
    await this._ensureLoaded();
    const k = this._mk(store, rawName);
    const existing = this._cache[k] || {};
    const row = {
      store: (store||'').toLowerCase().trim(),
      raw_name: (rawName||'').toLowerCase().trim(),
      inventory_id: existing.inventoryId || null,
      inventory_name: existing.inventoryName || null,
      add_config: addConfig,
    };
    if (existing.id) row.id = existing.id;
    try {
      const res = await db.upsertAlias(row);
      const saved = Array.isArray(res) ? res[0] : res;
      this._cache[k] = { ...existing, id: saved?.id || existing.id, addConfig };
    } catch (e) { console.error('saveAddConfig failed', e); }
  },

  invalidate() { this._cache = null; },
};

/* ─── RECEIPT SCANNER ─── */
function ReceiptScanner({ items, onClose, onConfirm, flash }) {
  const [step, setStep] = useState('capture'); // capture | processing | review | error
  const [imageDataUrl, setImageDataUrl] = useState(null);
  const [error, setError] = useState('');
  const [parsed, setParsed] = useState(null);
  // Each line item: { name, raw, qty, price, action: 'match'|'add'|'skip', inventoryId, addName, addCategory, addStore, addUnit, addPackSize }
  const [lines, setLines] = useState([]);
  const fileRef = useRef(null);

  const fuzzyMatch = (name) => {
    const n = name.toLowerCase().replace(/[^a-z0-9 ]/g, '').trim();
    if (!n) return null;
    let best = null, bestScore = 0;
    for (const it of items) {
      const target = it.name.toLowerCase().replace(/[^a-z0-9 ]/g, '');
      if (target === n) return it.id;
      const nWords = new Set(n.split(/\s+/));
      const tWords = new Set(target.split(/\s+/));
      let overlap = 0;
      nWords.forEach(w => { if (tWords.has(w) && w.length > 2) overlap++; });
      const score = (overlap / Math.max(nWords.size, tWords.size, 1)) * 100;
      const containsScore = (target.includes(n) || n.includes(target))
        ? (Math.min(target.length, n.length) / Math.max(target.length, n.length, 1)) * 80 : 0;
      const best2 = Math.max(score, containsScore);
      if (best2 > bestScore && best2 > 35) { best = it.id; bestScore = best2; }
    }
    return best;
  };

  const handleFile = async (file) => {
    if (!file) return;
    setError('');
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = async () => {
        const maxDim = 1600;
        let w = img.width, h = img.height;
        if (w > maxDim || h > maxDim) {
          if (w > h) { h = h * (maxDim / w); w = maxDim; } else { w = w * (maxDim / h); h = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
        setImageDataUrl(dataUrl);
        await processImage(dataUrl);
      };
      img.onerror = () => { setError('Could not read that image. Try another.'); setStep('error'); };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  };

  const processImage = async (dataUrl) => {
    setStep('processing');
    try {
      const base64 = dataUrl.split(',')[1];
      const mediaType = dataUrl.match(/data:([^;]+);/)?.[1] || 'image/jpeg';
      const resp = await fetch('/api/receipt-ocr', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: base64, mediaType, mode: 'receipt' }),
      });
      if (!resp.ok) {
        const errData = await resp.json().catch(() => ({}));
        setError(errData.error || `Server error (${resp.status})`);
        setStep('error');
        return;
      }
      const data = await resp.json();
      if (!data.items || !Array.isArray(data.items) || data.items.length === 0) {
        setError('No items found on the receipt. Try a clearer photo.');
        setStep('error');
        return;
      }
      setParsed(data);
      const store = data.store_guess || '';

      // Build line items — check alias cache first, then fuzzy match
      const built = await Promise.all(data.items.map(async li => {
        const alias = await receiptAliasStore.get(store, li.raw || li.name);
        const autoId = (alias?.inventoryId && items.find(i => i.id === alias.inventoryId))
          ? alias.inventoryId
          : fuzzyMatch(li.name);
        return {
          name: li.name,
          raw: li.raw || li.name,
          qty: li.qty || 1,
          price: li.price || 0,
          action: autoId ? 'match' : 'add',
          inventoryId: autoId || '',
          // add-new fields pre-filled from alias config or defaults
          addName: alias?.addConfig?.name || li.name,
          addCategory: alias?.addConfig?.category || 'Other',
          addStore: alias?.addConfig?.store || store || 'Other',
          addUnit: alias?.addConfig?.unit || 'ct',
          addPackSize: alias?.addConfig?.packSize || 1,
        };
      }));
      setLines(built);
      setStep('review');
    } catch (e) {
      setError(e.message || 'Network error. Check that the API is deployed.');
      setStep('error');
    }
  };

  const setLine = (idx, patch) =>
    setLines(p => p.map((l, i) => i === idx ? { ...l, ...patch } : l));

  const storeGuess = parsed?.store_guess || '';
  const activeCount = lines.filter(l => l.action !== 'skip').length;

  const inp = {
    width: '100%', fontSize: 12, padding: '6px 8px',
    borderRadius: 6, border: '1px solid var(--bd)',
    background: 'var(--card)', color: 'var(--tx)', boxSizing: 'border-box',
  };
  const sel = { ...inp, fontSize: 11 };
  const lbl = { fontSize: 10, color: 'var(--tx2)', marginBottom: 3, display: 'block' };

  return (
    <div className="overlay" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="modal" style={{ maxWidth: 480, maxHeight: '92vh', overflowY: 'auto' }}>

        {/* Header */}
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}>
          <div>
            <div className="modal-title">Scan Receipt</div>
            {step === 'review' && storeGuess && (
              <div style={{ fontSize: 12, color: 'var(--tx2)', marginTop: 2 }}>
                {storeGuess}{parsed.total ? ` · Total $${parsed.total}` : ''}
              </div>
            )}
          </div>
          <button className="panel-x" onClick={onClose}>×</button>
        </div>

        {/* Capture */}
        {step === 'capture' && (
          <div>
            <div style={{ background: 'var(--bg)', borderRadius: 12, padding: 24, textAlign: 'center', marginBottom: 14, border: '2px dashed var(--bd)' }}>
              <p style={{ fontSize: 13, color: 'var(--tx2)', marginBottom: 14 }}>Take a photo or upload a receipt image</p>
              <input ref={fileRef} type="file" accept="image/*" style={{ display: 'none' }} onChange={(e) => handleFile(e.target.files?.[0])} />
              <button className="btn-full" onClick={() => fileRef.current?.click()}>Choose Photo</button>
            </div>
            <div style={{ fontSize: 11, color: 'var(--mu)', textAlign: 'center', lineHeight: 1.6 }}>
              Receipt is processed by Claude AI. Review each line before anything is saved.
            </div>
          </div>
        )}

        {/* Processing */}
        {step === 'processing' && (
          <div style={{ padding: '40px 0', textAlign: 'center' }}>
            <div className="spinner" style={{ margin: '0 auto 16px' }} />
            <div style={{ fontSize: 14, fontWeight: 600 }}>Reading receipt…</div>
            <div style={{ fontSize: 12, color: 'var(--tx2)', marginTop: 4 }}>Extracting line items with Claude</div>
            {imageDataUrl && <img src={imageDataUrl} alt="receipt" style={{ maxWidth: '100%', maxHeight: 200, marginTop: 14, borderRadius: 10, border: '1px solid var(--bd)' }} />}
          </div>
        )}

        {/* Error */}
        {step === 'error' && (
          <div style={{ padding: '20px 0', textAlign: 'center' }}>
            <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 6 }}>Couldn't process receipt</div>
            <div style={{ fontSize: 12, color: 'var(--tx2)', marginBottom: 16, padding: '8px 12px', background: 'var(--bg)', borderRadius: 8 }}>{error}</div>
            <div style={{ display: 'flex', gap: 8 }}>
              <button className="btn-outline" style={{ flex: 1 }} onClick={() => { setStep('capture'); setError(''); setImageDataUrl(null); }}>Try Again</button>
              <button className="btn-gh" style={{ flex: 1 }} onClick={onClose}>Cancel</button>
            </div>
          </div>
        )}

        {/* Review */}
        {step === 'review' && (
          <div>
            <div style={{ maxHeight: '62vh', overflowY: 'auto', marginBottom: 14, paddingRight: 2 }}>
              {lines.map((l, idx) => {
                const matchedItem = l.inventoryId ? items.find(i => i.id === l.inventoryId) : null;
                const isSkipped = l.action === 'skip';
                return (
                  <div key={idx} style={{
                    padding: 12, marginBottom: 8, borderRadius: 10,
                    border: '1px solid var(--bd)',
                    background: isSkipped ? 'var(--bg)' : 'var(--card)',
                    opacity: isSkipped ? 0.45 : 1,
                  }}>
                    {/* Receipt line name + price */}
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 8 }}>
                      <div style={{ fontSize: 13, fontWeight: 600 }}>{l.name}</div>
                      <div style={{ fontSize: 13, fontWeight: 700, color: 'var(--pr)', marginLeft: 8, flexShrink: 0 }}>
                        ${(Number(l.price) || 0).toFixed(2)}{l.qty > 1 ? ` ×${l.qty}` : ''}
                      </div>
                    </div>

                    {/* Action selector tabs */}
                    <div style={{ display: 'flex', gap: 4, marginBottom: 10 }}>
                      {[['match', 'Match inventory'], ['add', 'Add new'], ['skip', 'Skip']].map(([val, label]) => (
                        <button key={val} onClick={() => setLine(idx, { action: val })} style={{
                          flex: 1, padding: '5px 4px', fontSize: 10, fontWeight: 700, borderRadius: 6, cursor: 'pointer',
                          border: '1px solid ' + (l.action === val ? (val === 'match' ? 'var(--ok)' : val === 'add' ? 'var(--pr)' : 'var(--mu)') : 'var(--bd)'),
                          background: l.action === val ? (val === 'match' ? 'var(--ok)' : val === 'add' ? 'var(--pr)' : 'var(--mu)') : 'transparent',
                          color: l.action === val ? '#fff' : 'var(--tx2)',
                        }}>{label}</button>
                      ))}
                    </div>

                    {/* Match: inventory dropdown */}
                    {l.action === 'match' && (
                      <div>
                        <label style={lbl}>Inventory item</label>
                        <select value={l.inventoryId || ''} onChange={e => setLine(idx, { inventoryId: e.target.value })} style={sel}>
                          <option value="">— select item —</option>
                          {[...items].sort((a,b) => a.name.localeCompare(b.name)).map(it => (
                            <option key={it.id} value={it.id}>{it.name} · {it.store}</option>
                          ))}
                        </select>
                        {matchedItem && (
                          <div style={{ fontSize: 11, color: 'var(--tx2)', marginTop: 5 }}>
                            Current stock: {matchedItem.current_qty} / {matchedItem.par_level} {matchedItem.unit}
                          </div>
                        )}
                      </div>
                    )}

                    {/* Add new: editable fields */}
                    {l.action === 'add' && (
                      <div style={{ display: 'grid', gap: 8 }}>
                        <div>
                          <label style={lbl}>Name in inventory</label>
                          <input value={l.addName} onChange={e => setLine(idx, { addName: e.target.value })} style={inp} />
                        </div>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
                          <div>
                            <label style={lbl}>Category</label>
                            <select value={l.addCategory} onChange={e => setLine(idx, { addCategory: e.target.value })} style={sel}>
                              {window.CATS.map(c => <option key={c}>{c}</option>)}
                            </select>
                          </div>
                          <div>
                            <label style={lbl}>Store</label>
                            <select value={l.addStore} onChange={e => setLine(idx, { addStore: e.target.value })} style={sel}>
                              {window.STORES.map(s => <option key={s}>{s}</option>)}
                            </select>
                          </div>
                        </div>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
                          <div>
                            <label style={lbl}>Unit</label>
                            <select value={l.addUnit} onChange={e => setLine(idx, { addUnit: e.target.value })} style={sel}>
                              {(window.UNITS || ['ct','lbs','oz','kg','g','gal','qt','l','ml','bag','box','case','ea']).map(u => <option key={u}>{u}</option>)}
                            </select>
                          </div>
                          <div>
                            <label style={lbl}>Pack size</label>
                            <input type="number" min="1" value={l.addPackSize} onChange={e => setLine(idx, { addPackSize: Number(e.target.value) || 1 })} style={inp} />
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            <button className="btn-full"
              onClick={() => onConfirm(lines, storeGuess)}
              disabled={activeCount === 0 || lines.some(l => l.action === 'match' && !l.inventoryId)}>
              Confirm {activeCount} item{activeCount !== 1 ? 's' : ''}
              {lines.some(l => l.action === 'match' && !l.inventoryId) ? ' — select inventory item above' : ''}
            </button>
          </div>
        )}

      </div>
    </div>
  );
}

/* ─── APP ─── */
function App() {
  const [items, setItems] = useState([]);
  const [sessions, setSessions] = useState([]);
  const [loading, setLoading] = useState(true);
  const [syncing, setSyncing] = useState(false);
  const [view, setView] = useState('dashboard');
  const [toast, setToast] = useState(null);
  const [session, setSession] = useState(null);
  const [lastSync, setLastSync] = useState(null);
  const [user, setUser] = useState(() => userStore.get() || 'Joe');
  const [showUserModal, setShowUserModal] = useState(false);
  const [showReceiptScanner, setShowReceiptScanner] = useState(false);
  const pollRef = useRef(null);

  const flash = useCallback((m) => {setToast(m);setTimeout(() => setToast(null), 2500);}, []);

  useEffect(() => {
    (async () => {
      try {
        let d = await db.getAll();
        if (d.length === 0) {setSyncing(true);d = await db.insertMany(SEED);flash('Inventory seeded!');setSyncing(false);}
        setItems(d);
        const [ss, allSess] = await Promise.all([db.getActiveSession(), db.getSessions()]);
        setSessions(allSess);
        if (ss.length > 0) {
          const s = ss[0];
          const hrs = (Date.now() - new Date(s.started_at).getTime()) / 3600000;
          if (hrs > 24) await db.endSession(s.id, { notes_summary: 'Auto-expired' });else
          setSession(s);
        }
        setLastSync(new Date());
      } catch (e) {console.error(e);flash('Connection failed');}
      setLoading(false);
    })();
  }, []);

  useEffect(() => {
    pollRef.current = setInterval(async () => {try {const d = await db.getAll();setItems(d);setLastSync(new Date());} catch {}}, 8000);
    return () => clearInterval(pollRef.current);
  }, []);

  const refresh = useCallback(async () => {
    setSyncing(true);
    try {const [d, s] = await Promise.all([db.getAll(), db.getSessions()]);setItems(d);setSessions(s);setLastSync(new Date());flash('Synced!');}
    catch {flash('Sync failed');}
    setSyncing(false);
  }, [flash]);

  const updateItem = useCallback(async (id, f, v) => {
    setItems((p) => p.map((i) => i.id === id ? { ...i, [f]: v } : i));
    try {await db.update(id, { [f]: v });} catch {flash('Update failed');}
  }, [flash]);

  const deleteItem = useCallback(async (id) => {
    setItems((p) => p.filter((i) => i.id !== id));
    try {await db.del(id);flash('Removed');} catch {flash('Delete failed');}
  }, [flash]);

  const addItem = useCallback(async (ni) => {
    if (!ni.name.trim()) return;
    setSyncing(true);
    try {const ins = await db.insert({ ...ni, name: ni.name.trim() });setItems((p) => [...p, ...ins].sort((a, b) => a.name.localeCompare(b.name)));setView('inventory');flash('Added!');}
    catch {flash('Failed to add');}
    setSyncing(false);
  }, [flash]);

  const startSession = useCallback(async (driverName) => {
    try {
      const created = await db.createSession({ status: 'active' });
      const sess = created[0];
      setSession(sess);
      setSessions((prev) => [sess, ...prev]);
      flash('Shopping trip started!');
      return sess;
    } catch {flash('Session start failed');return null;}
  }, [flash]);

  const checkItem = useCallback(async (id) => {
    const item = items.find((i) => i.id === id);if (!item) return;
    const isChecked = !!item.checked_at;
    if (isChecked) {
      setItems((p) => p.map((i) => i.id === id ? { ...i, checked_at: null, session_id: null } : i));
      try {await db.update(id, { checked_at: null, session_id: null });} catch {}
    } else {
      if (!session) {flash('Tap "Start Trip" to begin!');return;}
      const newQty = item.par_level;
      setItems((p) => p.map((i) => i.id === id ? { ...i, current_qty: newQty, checked_at: new Date().toISOString(), session_id: session.id } : i));
      try {await db.update(id, { current_qty: newQty, checked_at: new Date().toISOString(), session_id: session.id });} catch {flash('Update failed');}
    }
  }, [items, session, flash]);

  const endSession = useCallback(async () => {
    if (!session) return;
    const checkedItems = items.filter((i) => i.session_id === session.id && i.checked_at);
    const total = checkedItems.reduce((s, i) => s + Number(i.price || 0), 0);
    const notedItems = items.filter((i) => i.session_id === session.id && i.shopper_note);
    for (const ni of notedItems) {try {await db.archiveNote({ session_id: session.id, item_name: ni.name, store: ni.store, note: ni.shopper_note });} catch {}}
    // Log each purchase to purchase_log for analytics
    if (checkedItems.length > 0) {
      const purchaseRows = checkedItems.map(i => ({
        session_id: session.id,
        item_id: i.id,
        item_name: i.name,
        category: i.category,
        store: i.store,
        unit: i.unit,
        qty: Math.max(1, i.par_level - (i.current_qty || 0)),
        price: Number(i.price || 0),
      }));
      try {await db.logPurchases(purchaseRows);} catch (e) {console.error('Purchase log failed', e);}
    }
    for (const ci of checkedItems) {try {await db.update(ci.id, { checked_at: null, session_id: null, shopper_note: '' });} catch {}}
    try {await db.endSession(session.id, { total_spent: total, item_count: checkedItems.length });} catch {}
    setSession(null);
    flash(`Trip done! ${checkedItems.length} items · $${total.toFixed(2)}`);
    refresh();
  }, [session, items, flash, refresh]);

  const updateShopperNote = useCallback(async (id, note) => {
    setItems((p) => p.map((i) => i.id === id ? { ...i, shopper_note: note } : i));
    try {await db.update(id, { shopper_note: note });} catch {}
  }, []);

  const handleReceiptConfirm = useCallback(async (lines, storeGuess) => {
    // lines: [{ action:'match'|'add'|'skip', inventoryId, raw, name, qty, price, addName, addCategory, addStore, addUnit, addPackSize }]
    let updated = 0, added = 0;
    const purchaseRows = [];
    const aliasKey = (l) => l.raw || l.name;

    for (const l of lines) {
      if (l.action === 'skip') continue;

      if (l.action === 'match' && l.inventoryId) {
        const it = items.find(x => x.id === l.inventoryId);
        if (!it) continue;
        const packSize = Number(it.pack_size || 1);
        const newQty = Math.max(it.current_qty + (Number(l.qty) || 1) * packSize, 0);
        try {
          await db.update(l.inventoryId, { current_qty: newQty, price: Number(l.price) || it.price });
          setItems((p) => p.map((i) => i.id === l.inventoryId ? { ...i, current_qty: newQty, price: Number(l.price) || i.price } : i));
          updated++;
          await receiptAliasStore.saveMatch(storeGuess, aliasKey(l), l.inventoryId, it.name);
          purchaseRows.push({
            item_id: l.inventoryId, item_name: it.name, category: it.category,
            store: storeGuess || it.store, unit: it.unit,
            qty: Number(l.qty) || 1, price: Number(l.price) || 0,
          });
        } catch (e) { console.error('Update failed', e); }

      } else if (l.action === 'add') {
        const invName = (l.addName || l.name || '').trim();
        const invCategory = l.addCategory || 'Other';
        const invStore = l.addStore || storeGuess || 'Other';
        const invUnit = l.addUnit || 'ct';
        const invPackSize = Number(l.addPackSize || 1);
        try {
          const ins = await db.insert({
            name: invName, category: invCategory, store: invStore, unit: invUnit,
            current_qty: Number(l.qty) || 1, par_level: Number(l.qty) || 1,
            price: Number(l.price) || 0, note: 'Added from receipt scan', pack_size: invPackSize,
          });
          if (ins[0]) {
            setItems((p) => [...p, ins[0]].sort((a, b) => a.name.localeCompare(b.name)));
            added++;
            await receiptAliasStore.saveMatch(storeGuess, aliasKey(l), ins[0].id, invName);
            await receiptAliasStore.saveAddConfig(storeGuess, aliasKey(l), {
              name: invName, category: invCategory, store: invStore, unit: invUnit, packSize: invPackSize,
            });
            purchaseRows.push({
              item_id: ins[0].id, item_name: ins[0].name, category: invCategory,
              store: invStore, unit: invUnit,
              qty: Number(l.qty) || 1, price: Number(l.price) || 0,
            });
          }
        } catch (e) { console.error('Add failed', e); }
      }
    }
    if (purchaseRows.length > 0) {
      try { await db.logPurchases(purchaseRows); } catch {}
    }
    flash(`Receipt processed: ${updated} updated, ${added} added`);
    setShowReceiptScanner(false);
  }, [items, flash]);

  const handleUserSelect = (name) => {setUser(name);userStore.set(name);setShowUserModal(false);};

  const lowCt = items.filter((i) => i.current_qty < i.par_level && i.current_qty > 0).length;
  const outCt = items.filter((i) => i.current_qty === 0).length;

  if (loading) return (
    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: '100vh', gap: 16 }}>
      <div className="spinner" />
      <p style={{ color: 'var(--mu)', fontSize: 14 }}>Connecting to inventory…</p>
    </div>);


  return (
    <div className="app">
      {showUserModal && <UserModal user={user} onClose={() => setShowUserModal(false)} onSelect={handleUserSelect} />}
      <Sidebar view={view} setView={setView} user={user} outCt={outCt} onSync={refresh} syncing={syncing} lastSync={lastSync} onUserClick={() => setShowUserModal(true)} />
      <div className="main">
        <MobileHeader lowCt={lowCt} outCt={outCt} onSync={refresh} user={user} onUserClick={() => setShowUserModal(true)} />
        {view === 'dashboard' && <DashboardView items={items} sessions={sessions} onNavigate={(v) => {setView(v);}} onScanReceipt={() => setShowReceiptScanner(true)} flash={flash} />}
        {view === 'inventory' && <InventoryView items={items} onUpdate={updateItem} onDelete={deleteItem} flash={flash} />}
        {view === 'shopping' && <ShoppingView items={items} session={session} onCheck={checkItem} onStartSession={startSession} onEndSession={endSession} onShopperNote={updateShopperNote} flash={flash} />}
        {view === 'analytics' && <AnalyticsView items={items} sessions={sessions} />}
        {view === 'meals' && <MealsView items={items} />}
        {view === 'add' && <AddView onAdd={addItem} busy={syncing} flash={flash} />}
        {view === 'history' && <HistoryView sessions={sessions} />}
      </div>
      <BottomNav view={view} setView={setView} outCt={outCt} />
      {toast && <div className="toast-wrap"><div className="toast">{toast}</div></div>}
      {showReceiptScanner && <ReceiptScanner items={items} onClose={() => setShowReceiptScanner(false)} onConfirm={handleReceiptConfirm} flash={flash} />}
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
