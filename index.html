<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Joe's Kitchen</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F4EF;--card:#fff;--sb:#18120E;--pr:#C05621;--prl:#FEF0E8;--ok:#15803D;--okl:#F0FDF4;--wa:#D97706;--wal:#FFFBEB;--er:#DC2626;--erl:#FEF2F2;--tx:#1C1410;--tx2:#6B5E57;--bd:#E8E3DC;--mu:#A89080;--sw:220px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased}
input,select,button,textarea{font-family:inherit}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=range]{-webkit-appearance:none;width:100%;height:5px;border-radius:3px;outline:none;cursor:pointer;background:var(--bd)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--pr);border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.2);cursor:pointer}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes scanMove{0%{top:20%}50%{top:80%}100%{top:20%}}
@keyframes popIn{0%{opacity:0;transform:scale(.82)}60%{transform:scale(1.07)}100%{opacity:1;transform:scale(1)}}
@keyframes checkPop{0%{transform:scale(0) rotate(-20deg)}55%{transform:scale(1.25) rotate(4deg)}80%{transform:scale(.92)}100%{transform:scale(1) rotate(0deg)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 0 0 rgba(192,86,33,.35)}50%{box-shadow:0 0 0 6px rgba(192,86,33,0)}}
@keyframes badgePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(14px) scale(.95)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
@keyframes pageIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes statIn{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes rowIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.app{display:flex;min-height:100vh}
.sidebar{width:var(--sw);background:var(--sb);position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;z-index:100}
.sb-logo{padding:22px 20px 16px;border-bottom:1px solid rgba(255,255,255,.07);transition:background .18s}
.sb-logo:hover{background:rgba(255,255,255,.03)}
.sb-logo h1{font-size:17px;font-weight:700;color:#F5E6D3;letter-spacing:-.3px}
.sb-logo p{font-size:9px;color:var(--mu);font-weight:700;letter-spacing:1.8px;text-transform:uppercase;margin-top:2px}
.sb-nav{flex:1;padding:10px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:rgba(255,255,255,.45);border:none;background:none;width:100%;text-align:left;transition:all .2s cubic-bezier(.4,0,.2,1);margin-bottom:1px;letter-spacing:.01em;transform:translateX(0)}
.nav-item:hover{background:rgba(255,255,255,.09);color:rgba(255,255,255,.85);transform:translateX(3px)}
.nav-item.active{background:var(--pr);color:#fff;font-weight:600;transform:translateX(0);box-shadow:0 3px 12px rgba(192,86,33,.4)}
.nav-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;font-size:10px;font-weight:800;background:var(--er);color:#fff;padding:1px 6px;border-radius:10px}
.sb-footer{padding:12px;border-top:1px solid rgba(255,255,255,.07)}
.sb-sync{padding:7px 12px;font-size:11px;font-weight:600;color:rgba(255,255,255,.4);background:rgba(255,255,255,.06);border:none;border-radius:7px;cursor:pointer;width:100%;margin-bottom:8px;transition:background .18s,color .18s,transform .15s}
.sb-sync:hover{background:rgba(255,255,255,.12);color:rgba(255,255,255,.75);transform:translateY(-1px)}
.sb-sync:active{transform:scale(.97)}
.sb-user{display:flex;align-items:center;gap:10px;cursor:pointer;padding:8px 10px;border-radius:8px;transition:background .18s,transform .15s}
.sb-user:hover{background:rgba(255,255,255,.08);transform:translateX(2px)}
.u-av{width:30px;height:30px;border-radius:50%;background:var(--pr);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0}
.u-name{font-size:13px;font-weight:600;color:#F5E6D3}
.u-sub{font-size:10px;color:var(--mu)}
.main{margin-left:var(--sw);flex:1;min-height:100vh;padding-bottom:24px}
.mob-hdr{display:none;background:var(--sb);padding:13px 16px;position:sticky;top:0;z-index:100;align-items:center;justify-content:space-between}
.mob-hdr h1{font-size:15px;font-weight:700;color:#F5E6D3}
.mob-hdr-r{display:flex;gap:6px;align-items:center}
.m-chip{padding:3px 8px;border-radius:12px;font-size:10px;font-weight:800}
.m-chip-er{background:rgba(220,38,38,.3);color:#FCA5A5}
.m-chip-wa{background:rgba(217,119,6,.3);color:#FCD34D}
.bot-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--sb);border-top:1px solid rgba(255,255,255,.08);z-index:100;padding:6px 0 max(6px,env(safe-area-inset-bottom))}
.bn-inner{display:flex;justify-content:space-around}
.bn-item{display:flex;flex-direction:column;align-items:center;gap:1px;padding:5px 8px;cursor:pointer;border:none;background:none;color:rgba(255,255,255,.35);font-size:9px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;min-width:52px;transition:color .18s,transform .15s;position:relative}
.bn-item:hover{color:rgba(255,255,255,.65);transform:translateY(-2px)}
.bn-item:active{transform:scale(.9)}
.bn-item.active{color:var(--pr)}
.bn-icon{font-size:19px}
.bn-dot{position:absolute;top:3px;right:10px;width:7px;height:7px;border-radius:50%;background:var(--er);border:2px solid var(--sb)}
.page{padding:24px;max-width:860px;animation:pageIn .25s cubic-bezier(.4,0,.2,1)}
.stat-card:nth-child(1){animation:statIn .3s .04s both}
.stat-card:nth-child(2){animation:statIn .3s .09s both}
.stat-card:nth-child(3){animation:statIn .3s .14s both}
.stat-card:nth-child(4){animation:statIn .3s .19s both}
.page-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;gap:12px}
.page-title{font-size:22px;font-weight:700;line-height:1}
.page-sub{font-size:13px;color:var(--tx2);margin-top:3px}
.card{background:var(--card);border:1px solid var(--bd);border-radius:12px;transition:box-shadow .2s,border-color .2s,transform .2s}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.stat-card{padding:14px 16px;cursor:default;transition:box-shadow .22s cubic-bezier(.4,0,.2,1),transform .22s cubic-bezier(.4,0,.2,1)}
.stat-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.08)}
.stat-val{font-size:26px;font-weight:700;line-height:1}
.stat-lbl{font-size:11px;color:var(--tx2);margin-top:4px;font-weight:500}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:5px;font-size:9px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;transition:transform .15s}
.b-out{background:var(--erl);color:var(--er);animation:badgePulse 2s ease-in-out infinite}
.b-low{background:var(--wal);color:var(--wa)}
.b-ok{background:var(--okl);color:var(--ok)}
.item-row{background:var(--card);border:1px solid var(--bd);border-radius:10px;margin-bottom:5px;overflow:hidden;transition:box-shadow .2s,border-color .2s,transform .2s}
.item-row:hover{box-shadow:0 4px 16px rgba(0,0,0,.07);border-color:rgba(192,86,33,.2);transform:translateY(-1px)}
.item-main{padding:11px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .15s}
.item-main:hover{background:rgba(192,86,33,.02)}
.item-body{flex:1;min-width:0}
.item-top{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.item-name{font-size:14px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-price{font-size:11px;font-weight:600;color:var(--ok);flex-shrink:0}
.item-meta{display:flex;align-items:center;gap:5px;margin-bottom:5px;flex-wrap:wrap}
.item-qty{font-size:12px;color:var(--tx2)}
.store-tag{font-size:10px;font-weight:600;background:#F0EBE3;color:#7C6F64;padding:2px 7px;border-radius:4px}
.item-note{font-size:10px;color:var(--mu);font-style:italic}
.prog{height:3px;background:var(--bd);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.bar-fill{height:100%;border-radius:4px;transition:width .7s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;padding-right:7px;justify-content:flex-end;min-width:2px}.edit-panel{padding:12px 14px 14px;border-top:1px solid var(--bd);background:#FAFAF8;animation:slideUp .22s cubic-bezier(.4,0,.2,1)}
.e-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;gap:10px}
.e-lbl{font-size:11px;font-weight:700;color:var(--tx2);min-width:44px;text-transform:uppercase;letter-spacing:.3px;flex-shrink:0}
.e-inp{flex:1;max-width:180px;padding:7px 10px;border:1px solid var(--bd);border-radius:7px;font-size:13px;background:var(--card);color:var(--tx);outline:none;transition:border-color .18s,box-shadow .18s}
.e-inp:focus{border-color:var(--pr);box-shadow:0 0 0 3px rgba(192,86,33,.1)}
.qk-btns{display:flex;gap:4px}
.qk-btn{padding:6px 10px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:transform .12s,box-shadow .12s}
.qk-btn:hover{transform:translateY(-1px);box-shadow:0 2px 8px rgba(0,0,0,.12)}
.qk-btn:active{transform:scale(.93)}
.qk-m{background:var(--erl);color:var(--er)}
.qk-p{background:var(--okl);color:var(--ok)}
.del-btn{width:100%;padding:8px;background:none;border:1px solid #FECACA;border-radius:7px;color:var(--er);font-size:12px;font-weight:600;cursor:pointer;margin-top:6px;transition:background .15s,transform .15s}
.del-btn:hover{background:var(--erl);transform:translateY(-1px)}
.del-btn:active{transform:scale(.98)}
.grp-head{font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--mu);font-weight:700;margin:16px 0 6px;padding-bottom:5px;border-bottom:1px solid var(--bd);animation:fadeIn .2s ease}
.bk-check{width:18px;height:18px;border-radius:5px;border:2px solid var(--bd);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;transition:all .18s cubic-bezier(.4,0,.2,1)}
.bk-check:hover{border-color:var(--pr);transform:scale(1.12)}
.bk-check.on{background:var(--pr);border-color:var(--pr);animation:checkPop .25s cubic-bezier(.34,1.56,.64,1)}
.inp{width:100%;padding:10px 13px;border:1px solid var(--bd);border-radius:9px;font-size:14px;background:var(--card);color:var(--tx);outline:none;transition:border-color .18s,box-shadow .18s}
.inp:focus{border-color:var(--pr);box-shadow:0 0 0 3px rgba(192,86,33,.12)}
.inp-big{font-size:22px;font-weight:700;padding:12px 14px}
.sel{width:100%;padding:9px 10px;border:1px solid var(--bd);border-radius:8px;font-size:13px;background:var(--card);color:var(--tx);outline:none}
.sel:focus{border-color:var(--pr)}
.f-lbl{display:block;font-size:11px;font-weight:700;color:var(--tx2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.f-grp{margin-bottom:13px}
.f-row{display:flex;gap:12px}
.f-row .f-grp{flex:1}
.btn-pr{padding:10px 18px;background:var(--pr);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s,transform .15s,box-shadow .15s}
.btn-pr:hover{opacity:.92;transform:translateY(-1px);box-shadow:0 4px 14px rgba(192,86,33,.35)}
.btn-pr:active{transform:scale(.97);box-shadow:none}
.btn-pr:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.btn-gh{padding:10px 18px;background:var(--bd);color:var(--tx2);border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s,transform .15s}
.btn-gh:hover{background:#DDD8D0;transform:translateY(-1px)}
.btn-gh:active{transform:scale(.97)}
.btn-er{padding:7px 14px;background:var(--er);color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;transition:opacity .15s,transform .15s}
.btn-er:hover{opacity:.88;transform:translateY(-1px)}
.btn-er:active{transform:scale(.96)}
.btn-full{width:100%;padding:13px;background:var(--pr);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;transition:opacity .15s,transform .15s,box-shadow .15s}
.btn-full:hover{opacity:.92;transform:translateY(-2px);box-shadow:0 6px 18px rgba(192,86,33,.35)}
.btn-full:active{transform:scale(.98);box-shadow:none}
.btn-full:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.btn-outline{padding:8px 14px;background:none;border:1.5px solid var(--bd);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;color:var(--tx2);transition:all .18s}
.btn-outline:hover{border-color:var(--pr);color:var(--pr);background:var(--prl);transform:translateY(-1px)}
.btn-outline:active{transform:scale(.97)}
.chips{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{padding:6px 12px;border:1px solid var(--bd);border-radius:16px;font-size:11px;font-weight:600;background:var(--card);cursor:pointer;color:var(--tx2);white-space:nowrap;flex-shrink:0;transition:all .18s,transform .15s}
.chip:hover{border-color:var(--pr);color:var(--pr);transform:translateY(-1px);box-shadow:0 2px 8px rgba(192,86,33,.15)}
.chip:active{transform:scale(.96)}
.chip.on{background:#2D2118;color:#F5E6D3;border-color:#2D2118;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.filter-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.filter-sel{flex:1;min-width:110px;padding:8px 10px;border:1px solid var(--bd);border-radius:8px;font-size:12px;background:var(--card);color:var(--tx)}
.f-tog{padding:8px 12px;border:1px solid var(--bd);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:var(--card);color:var(--tx2);white-space:nowrap;transition:all .18s,transform .15s}
.f-tog:hover{border-color:var(--pr);color:var(--pr);transform:translateY(-1px)}
.f-tog:active{transform:scale(.96)}
.f-tog.on{background:var(--pr);color:#fff;border-color:var(--pr);box-shadow:0 3px 10px rgba(192,86,33,.3)}
.bulk-bar{background:var(--pr);color:#fff;padding:10px 14px;border-radius:10px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:10px;animation:slideUp .22s cubic-bezier(.4,0,.2,1);box-shadow:0 4px 14px rgba(192,86,33,.3)}
.bulk-acts{display:flex;gap:6px;align-items:center}
.bk-btn{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;border:none}
.bk-p{background:#fff;color:var(--pr)}
.bk-g{background:rgba(255,255,255,.2);color:#fff}
.bk-inp{padding:6px 10px;border-radius:6px;border:none;width:70px;font-size:13px;font-weight:600;outline:none}
.sess-banner{background:var(--okl);border:1px solid #BBF7D0;border-radius:10px;padding:12px 14px;margin-bottom:14px;animation:slideUp .25s cubic-bezier(.4,0,.2,1);box-shadow:0 3px 12px rgba(21,128,61,.1)}
.sess-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.sess-lbl{font-size:13px;font-weight:700;color:var(--ok)}
.sess-meta{font-size:12px;color:var(--tx2);display:flex;flex-wrap:wrap;gap:10px}
.sess-timer{font-variant-numeric:tabular-nums;font-weight:600}
.sh-item{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;background:var(--card);border-radius:9px;margin-bottom:4px;border:1px solid var(--bd);cursor:pointer;flex-wrap:wrap;transition:background .15s,box-shadow .18s,transform .18s,border-color .18s}
.sh-item:hover{background:#FAFAF8;box-shadow:0 3px 12px rgba(0,0,0,.06);transform:translateY(-1px);border-color:rgba(192,86,33,.15)}
.sh-item:active{transform:scale(.99)}
.sh-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--bd);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .2s cubic-bezier(.4,0,.2,1)}
.sh-check.done{background:var(--ok);border-color:var(--ok);color:#fff;font-size:12px;font-weight:700;animation:checkPop .3s cubic-bezier(.4,0,.2,1)}
.sh-name{font-size:14px;font-weight:600}
.sh-sub{font-size:11px;color:var(--tx2);margin-top:2px}
.sh-warn{font-size:11px;color:var(--wa);margin-top:2px;font-style:italic}
.sh-right{margin-left:auto;text-align:right;flex-shrink:0}
.sh-price{font-size:11px;font-weight:600;color:var(--ok);display:block}
.sh-qty{font-size:13px;font-weight:700;color:var(--pr);display:block}
.sh-done{opacity:.55}
.sh-done .sh-name{text-decoration:line-through}
.stH{display:flex;align-items:center;justify-content:space-between;margin:16px 0 6px;padding-bottom:5px;border-bottom:2px solid var(--pr)}
.note-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--bd);background:var(--card);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:border-color .15s,transform .15s,box-shadow .15s}
.note-btn:hover{border-color:var(--pr);transform:translateY(-1px);box-shadow:0 2px 8px rgba(192,86,33,.15)}
.note-btn:active{transform:scale(.92)}
.sh-pills{width:100%;display:flex;gap:6px;margin-top:8px}
.sh-pill{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:7px 12px;border-radius:999px;border:1px solid var(--bd);background:var(--card);font-size:12px;font-weight:600;color:var(--tx2);cursor:pointer;transition:all .18s ease;letter-spacing:.1px}
.sh-pill:hover:not(:disabled){border-color:var(--pr);color:var(--pr);transform:translateY(-1px);box-shadow:0 2px 8px rgba(192,86,33,.12)}
.sh-pill:active:not(:disabled){transform:scale(.97)}
.sh-pill:disabled{opacity:.6;cursor:wait}
.sh-pill-active{background:linear-gradient(135deg,var(--pr),#a04618);color:#fff;border-color:var(--pr);box-shadow:0 2px 10px rgba(192,86,33,.25)}
.sh-pill-active:hover:not(:disabled){color:#fff;border-color:var(--pr)}
.sh-pill-icon{font-size:12px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px}
.note-panel{width:100%;padding:10px 0 0;animation:fadeIn .18s ease;display:flex;flex-direction:column;gap:6px}
.note-inp{width:100%;padding:9px 12px;border:1px solid var(--bd);border-radius:10px;font-size:13px;background:var(--wal);color:var(--tx);font-family:inherit;resize:none;min-height:44px;outline:none;transition:border-color .18s,box-shadow .18s}
.note-inp:focus{border-color:var(--wa);box-shadow:0 0 0 3px rgba(217,119,6,.1)}
.panel-close{align-self:flex-end;padding:5px 14px;border-radius:999px;border:1px solid var(--bd);background:var(--card);font-size:11px;font-weight:600;color:var(--tx2);cursor:pointer;transition:all .15s}
.panel-close:hover{background:var(--pr);color:#fff;border-color:var(--pr)}
.price-panel{display:flex;align-items:flex-start;gap:8px;background:linear-gradient(135deg,#fff7ed,#fff);border:1px solid #FDE68A;border-radius:12px;padding:12px 14px;width:100%;margin-top:8px;font-size:12px;color:var(--tx);line-height:1.55;animation:slideUp .22s cubic-bezier(.4,0,.2,1);box-shadow:0 1px 4px rgba(0,0,0,.04)}
.panel-x{flex-shrink:0;width:22px;height:22px;border-radius:50%;border:none;background:rgba(0,0,0,.06);font-size:14px;font-weight:600;color:var(--tx2);cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;transition:all .15s;padding:0}
.panel-x:hover{background:var(--er);color:#fff}

<script type="text/babel">

const { useState, useEffect, useCallback, useRef, useMemo } = React;
const { db, mileageStore, userStore, CATS, STORES, UNITS, SEED } = window;

/* ─── SHARED UI ─── */
function Badge({ status }) {
  if (status === 'out') return <span className="badge b-out">Out</span>;
  if (status === 'low') return <span className="badge b-low">Low</span>;
  return <span className="badge b-ok">OK</span>;
}
function StatCard({ val, label, color, sub }) {
  const [displayed, setDisplayed] = useState(val);
  const [pop, setPop] = useState(false);
  const prevRef = useRef(val);
  useEffect(() => {
    if (val !== prevRef.current) {setPop(true);setTimeout(() => setPop(false), 400);}
    prevRef.current = val;
    setDisplayed(val);
  }, [val]);
  return (
    <div className="card stat-card" style={{ position: 'relative', overflow: 'hidden' }}>
      <div className="stat-val" style={{ color: color || 'var(--tx)', transition: 'transform .2s', transform: pop ? 'scale(1.18)' : 'scale(1)' }}>{displayed}</div>
      <div className="stat-lbl">{label}</div>
      {sub && <div style={{ fontSize: 10, color: 'var(--mu)', marginTop: 2 }}>{sub}</div>}
    </div>);

}
function BarChartSVG({ data, color = 'var(--pr)', fmt = '' }) {
  const max = Math.max(...data.map((d) => d.value), 1);
  const [widths, setWidths] = useState(data.map(() => 0));
  useEffect(() => {
    const t = setTimeout(() => setWidths(data.map((d) => d.value / max * 100)), 60);
    return () => clearTimeout(t);
  }, []);
  return (
    <div className="chart-wrap">
      {data.map((d, i) =>
      <div key={i} className="bar-row" style={{ animation: `rowIn .3s ${i * .04}s both` }}>
          <div className="bar-lbl" title={d.label}>{d.label}</div>
          <div className="bar-track">
            <div className="bar-fill" style={{ width: `${widths[i]}%`, background: color, transition: `width .7s ${i * .05}s cubic-bezier(.4,0,.2,1)` }}>
              {d.value > 0 && <span className="bar-num">{fmt}{d.value.toFixed(0)}</span>}
            </div>
          </div>
        </div>
      )}
    </div>);

}
function ItemRow({ item, editing, bulk, selected, onToggle, onUpdate, onDelete, onBulkToggle }) {
  const pct = item.par_level > 0 ? Math.min(item.current_qty / item.par_level * 100, 100) : 0;
  const status = item.current_qty === 0 ? 'out' : item.current_qty < item.par_level ? 'low' : 'ok';
  const bc = status === 'out' ? 'var(--er)' : status === 'low' ? 'var(--wa)' : 'var(--ok)';
  const max = Math.max(item.par_level * 2, 10);
  const packSize = Number(item.pack_size || 1);
  const showPackInfo = packSize > 1;
  const packsRemaining = showPackInfo ? (item.current_qty / packSize).toFixed(1) : null;
  return (
    <div className="item-row">
      <div className="item-main" onClick={bulk ? () => onBulkToggle(item.id) : onToggle}>
        {bulk && <div className={`bk-check ${selected ? 'on' : ''}`}>{selected && '✓'}</div>}
        <div className="item-body">
          <div className="item-top">
            <span className="item-name">{item.name}</span>
            <Badge status={status} />
            {item.price > 0 && <span className="item-price">${Number(item.price).toFixed(2)}</span>}
          </div>
          <div className="item-meta">
            <span className="item-qty">{item.current_qty}/{item.par_level} {item.unit}</span>
            {showPackInfo && <span className="store-tag" style={{ background: '#fef3c7', color: '#92400e' }}>{packsRemaining} packs</span>}
            {item.store && item.store !== 'Other' && <span className="store-tag">{item.store}</span>}
            {item.note && <span className="item-note">{item.note}</span>}
          </div>
          <div className="prog"><div className="prog-fill" style={{ width: pct + '%', backgroundColor: bc }} /></div>
        </div>
      </div>
      {editing && !bulk &&
      <div className="edit-panel">
          <div style={{ marginBottom: 12 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 5 }}>
              <label className="e-lbl">Stock Level</label>
              <span style={{ fontSize: 14, fontWeight: 700, color: bc }}>
                {item.current_qty} {item.unit}
                {showPackInfo && <span style={{ fontSize: 11, color: 'var(--mu)', fontWeight: 500 }}> ({packsRemaining} packs)</span>}
              </span>
            </div>
            <input type="range" min={0} max={max} step={packSize > 1 ? 0.5 : 1} value={item.current_qty}
          onChange={(e) => onUpdate(item.id, 'current_qty', +e.target.value)}
          style={{ background: `linear-gradient(to right,${bc} ${item.current_qty / max * 100}%,var(--bd) ${item.current_qty / max * 100}%)` }} />
          
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 10, color: 'var(--mu)', marginTop: 3 }}>
              <span>0</span><span style={{ color: 'var(--pr)', fontWeight: 700 }}>Par: {item.par_level}</span><span>{max}</span>
            </div>
          </div>
          <div className="e-row" style={{ marginBottom: 11 }}>
            <label className="e-lbl">Quick</label>
            <div className="qk-btns">

function InventoryView({ items, onUpdate, onDelete, flash }) {
  const [editingId, setEditingId] = useState(null);
  const [search, setSearch] = useState('');
  const [catF, setCatF] = useState('All');
  const [storeF, setStoreF] = useState('All');
  const [lowOnly, setLowOnly] = useState(false);
  const [bulkMode, setBulkMode] = useState(false);
  const [selected, setSelected] = useState(new Set());
  const [bulkQty, setBulkQty] = useState('');
  const [groupBy, setGroupBy] = useState('category'); // 'category' | 'store'

  const filtered = items.filter((i) => {
    if (search && !i.name.toLowerCase().includes(search.toLowerCase())) return false;
    if (catF !== 'All' && i.category !== catF) return false;
    if (storeF !== 'All' && i.store !== storeF) return false;
    if (lowOnly && i.current_qty >= i.par_level) return false;
    return true;
  });
  const grouped = filtered.reduce((a, i) => {
    const key = groupBy === 'store' ? (i.store || 'Other') : i.category;
    (a[key] = a[key] || []).push(i);
    return a;
  }, {});
  const toggleSel = (id) => setSelected((prev) => {const n = new Set(prev);n.has(id) ? n.delete(id) : n.add(id);return n;});
  const applyBulk = async () => {
    if (!bulkQty || !selected.size) return;
    const qty = Number(bulkQty);
    for (const id of selected) await onUpdate(id, 'current_qty', qty);
    flash(`Updated ${selected.size} items → qty ${qty}`);
    setSelected(new Set());setBulkQty('');setBulkMode(false);
  };
  return (
    <div className="page">
      <div className="page-hdr">
        <div><div className="page-title">Inventory</div><div className="page-sub">{items.length} items tracked</div></div>
        <button className={`f-tog ${bulkMode ? 'on' : ''}`} onClick={() => {setBulkMode(!bulkMode);setSelected(new Set());}}>
          {bulkMode ? '✕ Cancel' : 'Bulk Update'}
        </button>
      </div>
      {bulkMode &&
      <div className="bulk-bar">
          <span style={{ fontSize: 13, fontWeight: 600 }}>{selected.size} selected</span>
          <div className="bulk-acts">
            <input type="number" placeholder="Set qty" value={bulkQty} onChange={(e) => setBulkQty(e.target.value)} className="bk-inp" />
            <button className="bk-btn bk-p" onClick={applyBulk} disabled={!bulkQty || !selected.size}>Apply</button>
            <button className="bk-btn bk-g" onClick={() => setSelected(new Set(filtered.map((i) => i.id)))}>Select All</button>
          </div>
        </div>
      }
      <input className="inp" type="text" placeholder="Search items..." value={search} onChange={(e) => setSearch(e.target.value)} style={{ marginBottom: 8 }} />
      <div className="filter-row" style={{ flexWrap: 'wrap', gap: 6 }}>
        <select className="filter-sel" value={catF} onChange={(e) => setCatF(e.target.value)}>
          <option value="All">All Categories</option>
          {CATS.map((c) => <option key={c}>{c}</option>)}
        </select>
        <select className="filter-sel" value={storeF} onChange={(e) => setStoreF(e.target.value)}>
          <option value="All">All Stores</option>
          {STORES.map((s) => <option key={s}>{s}</option>)}
        </select>
        <button className={`f-tog ${lowOnly ? 'on' : ''}`} onClick={() => setLowOnly(!lowOnly)}>Low Only</button>
        <div style={{ display: 'flex', gap: 3, background: 'var(--bg)', padding: 3, borderRadius: 8, marginLeft: 'auto' }}>
          {[['category','By Category'],['store','By Store']].map(([k,l]) => (
            <button key={k} onClick={() => setGroupBy(k)} style={{
              padding: '5px 10px', borderRadius: 6, fontSize: 10, fontWeight: 700, cursor: 'pointer', border: 'none',
              background: groupBy === k ? 'var(--card)' : 'transparent',
              color: groupBy === k ? 'var(--pr)' : 'var(--tx2)',
              boxShadow: groupBy === k ? '0 1px 3px rgba(0,0,0,.1)' : 'none',
            }}>{l}</button>
          ))}
        </div>
      </div>
      {groupBy === 'store' && (
        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 8 }}>
          {Object.entries(grouped).sort().map(([store, its]) => {
            const out = its.filter(i => i.current_qty === 0).length;
            const low = its.filter(i => i.current_qty > 0 && i.current_qty < i.par_level).length;
            return (
              <div key={store} style={{ padding: '6px 12px', background: 'var(--card)', borderRadius: 10, border: '1px solid var(--bd)', fontSize: 11 }}>
                <span style={{ fontWeight: 700 }}>{store}</span>
                <span style={{ color: 'var(--mu)', marginLeft: 6 }}>{its.length} items</span>
                {out > 0 && <span style={{ color: 'var(--er)', marginLeft: 6, fontWeight: 700 }}>{out} out</span>}
                {low > 0 && <span style={{ color: 'var(--wa)', marginLeft: 4, fontWeight: 700 }}>{low} low</span>}
              </div>
            );
          })}
        </div>
      )}
      {Object.keys(grouped).sort().map((grpKey) =>
      <div key={grpKey}>
          <div className="grp-head">
            {grpKey} <span style={{ opacity: .5 }}>({grouped[grpKey].length})</span>
            {groupBy === 'store' && (() => {
              const its = grouped[grpKey];
              const est = its.reduce((s,i) => s + Number(i.price||0) * Math.max(0,i.par_level - i.current_qty), 0);
              return est > 0 ? <span style={{ fontSize: 11, color: 'var(--pr)', fontWeight: 700, marginLeft: 8 }}>~${est.toFixed(0)} to restock</span> : null;
            })()}
          </div>
          {grouped[grpKey].map((item, idx) =>
        <div key={item.id} style={{ animation: `rowIn .28s ${idx * .03}s both` }}>
              <ItemRow item={item}
          editing={!bulkMode && editingId === item.id}
          bulk={bulkMode} selected={selected.has(item.id)}
          onToggle={() => setEditingId(editingId === item.id ? null : item.id)}
          onUpdate={onUpdate} onDelete={onDelete} onBulkToggle={toggleSel} />
            </div>
        )}
        </div>
      )}
      {filtered.length === 0 && <div className="empty"><div className="empty-icon"></div><p>No items match your filters</p></div>}
    </div>);

}

function ShoppingView({ items, session, onCheck, onStartSession, onEndSession, onShopperNote, flash }) {
  const [storeF, setStoreF] = useState('All');
  const [expandNote, setExpandNote] = useState(null);
  const [showStart, setShowStart] = useState(false);
  const [showEnd, setShowEnd] = useState(false);
  const [startData, setStartData] = useState({ name: userStore.get(), miles: '' });
  const [endMiles, setEndMiles] = useState('');
  const [elapsed, setElapsed] = useState('');
  const timerRef = useRef(null);
  // Smart Route / Price Compare state
  const [showRouteModal, setShowRouteModal] = useState(false);
  const [routeStep, setRouteStep] = useState('zip'); // zip | loading | results | route
  const [zipCode, setZipCode] = useState('');
  const [destination, setDestination] = useState('');
  const [priceResults, setPriceResults] = useState(null); // { items: [{name, stores:[{store,price,isBest}]}], totalSavings }
  const [selectedStores, setSelectedStores] = useState({}); // itemId -> storeName
  const [routeData, setRouteData] = useState(null); // [{store, order, items, subtotal}]
  const [routeLoading, setRouteLoading] = useState(false);

  useEffect(() => {
    if (!session) {clearInterval(timerRef.current);setElapsed('');return;}
    const tick = () => {
      const ms = Date.now() - new Date(session.started_at).getTime();
      const h = Math.floor(ms / 3600000),m = Math.floor(ms % 3600000 / 60000),s = Math.floor(ms % 60000 / 1000);
      setElapsed(`${h > 0 ? h + 'h ' : ''}${m}m ${s}s`);
    };
    tick();timerRef.current = setInterval(tick, 1000);
    return () => clearInterval(timerRef.current);
  }, [session]);

  const needsList = items.filter((i) => i.current_qty < i.par_level || i.checked_at);
  const unchecked = needsList.filter((i) => !i.checked_at);
  const checked = needsList.filter((i) => !!i.checked_at);
  const byStore = unchecked.reduce((a, i) => {const s = i.store || 'Other';(a[s] = a[s] || []).push(i);return a;}, {});
  const allStores = [...new Set([...unchecked, ...checked].map((i) => i.store || 'Other'))].sort();
  const showStore = storeF === 'All' ? byStore : { [storeF]: byStore[storeF] || [] };
  const checkedShow = storeF === 'All' ? checked : checked.filter((i) => (i.store || 'Other') === storeF);
  const total = [...unchecked, ...checked].reduce((s, i) => s + Number(i.price || 0), 0);

  // Auto-prompt end when all items checked
  useEffect(() => {
    if (session && unchecked.length === 0 && checked.length > 0 && !showEnd) setShowEnd(true);
  }, [session, unchecked.length, checked.length]);

  const handleStart = async () => {
    if (!startData.miles) return;
    const sess = await onStartSession(startData.name);
    if (sess) {mileageStore.save(sess.id, { start_miles: Number(startData.miles), driver: startData.name });userStore.set(startData.name);}
    setShowStart(false);
  };

  const handleEnd = async () => {
    if (session) {
      mileageStore.save(session.id, { end_miles: Number(endMiles), end_time: new Date().toISOString() });
    }
    await onEndSession();
    setShowEnd(false);setEndMiles('');setRoutePlan(null);
  };

  // ── Smart Route / Price Compare ──
  const openRouteModal = () => {
    setShowRouteModal(true);
    setRouteStep('zip');
    setPriceResults(null);
    setSelectedStores({});
    setRouteData(null);
  };

  const runPriceCompare = async () => {
    if (!zipCode.trim()) return;
    setRouteStep('loading');
    const itemList = unchecked.map(i => ({ id: i.id, name: i.name, trackedStore: i.store, trackedPrice: i.price || 0, category: i.category }));
    try {
      const resp = await fetch('/api/receipt-ocr', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          mode: 'compare',
          image: 'placeholder',
          context: {
            itemName: 'price_compare_json',
            category: 'planning',
            currentStore: zipCode,
            currentPrice: 0,
            history: [{
              note: `ZIP code: ${zipCode}. Shopping list: ${JSON.stringify(itemList.slice(0,20).map(i=>({name:i.name,trackedStore:i.trackedStore,trackedPrice:i.trackedPrice})))}.
Available stores in WA: Restaurant Depot, US Chef Store, QFC, Costco, Trader Joe's, Plaza Latina, Imrans, African Store, Walmart, Amazon.
For each item, estimate prices at 2-4 relevant stores based on typical retail prices in WA. Use real knowledge of what each store typically charges.
Respond ONLY with valid JSON, no markdown:
{"items":[{"id":"<id>","name":"<name>","stores":[{"store":"<name>","price":<number>,"note":"<optional note>"}]}],"totalCurrentCost":<number>,"totalBestCost":<number>}`
            }],
          },
        }),
      });
      if (!resp.ok) throw new Error('API error');
      const data = await resp.json();
      let raw = data.recommendation || '';
      raw = raw.replace(/```json|```/g, '').trim();
      let parsed;
      try { parsed = JSON.parse(raw); } catch { throw new Error('Could not parse price data'); }

      // Mark best price per item, set default selection to cheapest
      const defaults = {};
      parsed.items = (parsed.items || []).map(item => {
        const sorted = [...(item.stores||[])].sort((a,b) => a.price - b.price);
        const best = sorted[0];
        defaults[item.id] = best?.store || item.stores?.[0]?.store;
        return { ...item, stores: item.stores.map(s => ({ ...s, isBest: s.store === best?.store })) };
      });
      setSelectedStores(defaults);
      const savings = (parsed.totalCurrentCost||0) - (parsed.totalBestCost||0);
      setPriceResults({ ...parsed, totalSavings: Math.max(0, savings) });
      setRouteStep('results');
    } catch (e) {
      alert('Price compare failed: ' + e.message);
      setRouteStep('zip');
    }
  };

  const buildRoute = async () => {
    setRouteLoading(true);
    // Group items by selected store
    const storeGroups = {};
    (priceResults?.items || []).forEach(item => {
      const store = selectedStores[item.id];
      if (!store) return;
      const inv = unchecked.find(i => i.id === item.id);
      if (!storeGroups[store]) storeGroups[store] = [];
      storeGroups[store].push({ name: item.name, price: item.stores.find(s=>s.store===store)?.price || 0, unit: inv?.unit||'ct', qty: inv ? inv.par_level - inv.current_qty : 1 });
    });
    const storeList = Object.keys(storeGroups);
    try {
      const resp = await fetch('/api/receipt-ocr', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          mode: 'compare',
          image: 'placeholder',
          context: {
            itemName: 'route_order_json',
            category: 'planning',
            currentStore: zipCode,
            currentPrice: 0,
            history: [{
              note: `ZIP: ${zipCode}. Destination after shopping: ${destination || 'home / back to zip ' + zipCode}.
Stores to visit: ${storeList.join(', ')}.
Order these stores for the most efficient driving route starting from ZIP ${zipCode} and ending at ${destination || 'ZIP ' + zipCode}.
Consider that Restaurant Depot and US Chef Store are typically farther / wholesale, QFC and Walmart are nearby, Costco is mid-distance.
Respond ONLY with valid JSON, no markdown:
{"route":[{"store":"<name>","order":<number>,"travelNote":"<short note about this leg>"}],"totalEstimatedMiles":<number>,"routeSummary":"<1 sentence>"}`
            }],
          },
        }),
      });
      if (!resp.ok) throw new Error('API error');
      const data = await resp.json();
      let raw = data.recommendation || '';
      raw = raw.replace(/```json|```/g, '').trim();
      let parsed;
      try { parsed = JSON.parse(raw); } catch { throw new Error('Could not parse route data'); }

      const route = (parsed.route || []).sort((a,b) => a.order - b.order).map(r => ({
        ...r,
        items: storeGroups[r.store] || [],
        subtotal: (storeGroups[r.store] || []).reduce((s,i) => s + i.price, 0),
      }));
      setRouteData({ stops: route, totalMiles: parsed.totalEstimatedMiles, summary: parsed.routeSummary });
